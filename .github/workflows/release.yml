name: Release

# Build the Windows desktop bundle and publish it to a GitHub Release whenever
# a version tag (e.g. v1.2.0) is pushed. Gives non-developers a one-click .zip
# download — no Python required.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows bundle
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller Orynn.spec --noconfirm

      - name: Package bundle
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag -or $tag -eq "main") { $tag = "${{ github.event.inputs.tag }}" }
          $zip = "Orynn-$tag-windows-x64.zip"
          Compress-Archive -Path dist/Orynn/* -DestinationPath $zip -Force
          echo "ASSET=$zip" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: orynn-windows-x64
          path: ${{ env.ASSET }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          draft: false
          prerelease: false
