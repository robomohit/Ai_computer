<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Orynn hero card</title>
  <desc id="desc">Orynn is a local Windows AI agent that controls apps by UI Automation control names instead of screenshots.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1117"/>
      <stop offset="0.52" stop-color="#101b23"/>
      <stop offset="1" stop-color="#071719"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="42%" r="55%">
      <stop offset="0" stop-color="#5be0d0" stop-opacity=".38"/>
      <stop offset=".48" stop-color="#5be0d0" stop-opacity=".08"/>
      <stop offset="1" stop-color="#5be0d0" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g opacity=".18">
    <path d="M0 492 C180 410 274 500 454 420 S810 292 1200 392" fill="none" stroke="#5be0d0" stroke-width="2"/>
    <path d="M0 535 C210 454 312 548 500 470 S840 340 1200 434" fill="none" stroke="#9cf8ed" stroke-width="1"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="130" y="112" width="940" height="406" rx="38" fill="#0f1921" stroke="#2b4650"/>
    <rect x="164" y="150" width="872" height="338" rx="28" fill="#101d25" stroke="#203741"/>
    <rect x="198" y="198" width="370" height="86" rx="28" fill="#142630" stroke="#31555e"/>
    <circle cx="246" cy="241" r="24" fill="#5be0d0"/>
    <path d="M238 242 l7 7 15-18" fill="none" stroke="#062326" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="290" y="248" fill="#effffc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700">Find Send by name</text>
    <rect x="198" y="316" width="804" height="104" rx="28" fill="#0c151c" stroke="#24404a"/>
    <text x="232" y="360" fill="#9beee3" font-family="Consolas,Menlo,monospace" font-size="26">uia_click({"query":"Send","app":"Discord"})</text>
    <text x="232" y="397" fill="#c9d8dc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">No screenshots. No pixel guessing. Free-model friendly.</text>
  </g>
  <text x="130" y="74" fill="#5be0d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700">Orynn</text>
  <text x="130" y="574" fill="#effffc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="800">The local Windows AI agent that actually uses your computer.</text>
</svg>
